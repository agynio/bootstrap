name: bootstrap
on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('bootstrap-pr-{0}', github.event.pull_request.number) || 'bootstrap-main' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  full-apply:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Docker
        run: |
          docker version || (echo "Docker is required" && exit 1)

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.28.7

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Install k3d
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
          k3d version

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Apply k8s stack
        working-directory: stacks/k8s
        run: |
          terraform init -input=false
          terraform apply -auto-approve -input=false

      - name: Apply system stack (Istio + Argo CD)
        working-directory: stacks/system
        run: |
          terraform init -input=false
          terraform apply -auto-approve -input=false

      - name: Apply platform stack
        working-directory: stacks/platform
        run: |
          terraform init -input=false
          terraform apply -auto-approve -input=false

      - name: Verify platform workloads and Argo CD health
        run: ./.github/scripts/verify_platform_health.sh

      - name: Destroy platform stack (PR only)
        if: ${{ always() && github.event_name == 'pull_request' }}
        working-directory: stacks/platform
        run: |
          terraform init -input=false
          terraform destroy -auto-approve -input=false

      - name: Destroy system stack (PR only)
        if: ${{ always() && github.event_name == 'pull_request' }}
        working-directory: stacks/system
        run: |
          terraform init -input=false
          terraform destroy -auto-approve -input=false

      - name: Destroy k8s stack (PR only)
        if: ${{ always() && github.event_name == 'pull_request' }}
        working-directory: stacks/k8s
        run: |
          terraform init -input=false
          terraform destroy -auto-approve -input=false

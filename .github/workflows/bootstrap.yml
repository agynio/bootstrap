name: bootstrap
on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('bootstrap-pr-{0}', github.event.pull_request.number) || 'bootstrap-main' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  full-apply:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.34.3

      - name: Install k3d
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
          k3d version

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Install OpenZiti CLI
        run: |
          curl -sS https://get.openziti.io/install.bash | sudo bash -s -- openziti

      - name: Apply all stacks (k8s -> system -> routing -> minio -> platform)
        run: ./apply.sh -y

      - name: Verify platform workloads and Argo CD health
        run: ./.github/scripts/verify_platform_health.sh

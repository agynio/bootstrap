name: bootstrap
on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  full-apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Docker
        run: |
          docker version || (echo "Docker is required" && exit 1)

      - name: Install k3d
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
          k3d version

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Timestamp
        id: ts
        run: echo "utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Apply k8s stack
        working-directory: stacks/k8s
        run: |
          terraform init -input=false
          terraform apply -auto-approve -input=false

      - name: Apply system stack (Istio + Argo CD)
        working-directory: stacks/system
        env:
          TF_VAR_argocd_admin_password_mtime: "${{ steps.ts.outputs.utc }}"
        run: |
          terraform init -input=false
          terraform apply -auto-approve -input=false
          kubectl -n argocd rollout restart deploy argocd-server
          kubectl -n argocd rollout status deploy argocd-server --timeout=120s
          kubectl -n argocd get secret argocd-secret -o jsonpath='{.data.admin\.passwordMtime}' | base64 -d || true

      - name: Destroy system stack (PR only)
        if: ${{ github.event_name == 'pull_request' }}
        working-directory: stacks/system
        env:
          TF_VAR_argocd_admin_password_mtime: "${{ steps.ts.outputs.utc }}"
        run: |
          terraform init -input=false
          terraform destroy -auto-approve -input=false

      - name: Destroy k8s stack (PR only)
        if: ${{ github.event_name == 'pull_request' }}
        working-directory: stacks/k8s
        run: |
          terraform init -input=false
          terraform destroy -auto-approve -input=false

name: bootstrap
on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('bootstrap-pr-{0}', github.event.pull_request.number) || 'bootstrap-main' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  full-apply:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Docker
        run: |
          docker version || (echo "Docker is required" && exit 1)

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.28.7

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Install k3d
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
          k3d version

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Configure local hostnames
        run: |
          sudo tee -a /etc/hosts >/dev/null <<'EOF'
          127.0.0.1 argocd.agyn.dev
          127.0.0.1 agyn.dev
          127.0.0.1 platform.agyn.dev
          127.0.0.1 vault.agyn.dev
          127.0.0.1 litellm.agyn.dev
          127.0.0.1 registry.agyn.dev
          EOF

      - name: Apply k8s stack
        run: |
          terraform -chdir=stacks/k8s init -input=false
          terraform -chdir=stacks/k8s apply -auto-approve -input=false

      - name: Export kubeconfig for kubectl
        run: |
          kubeconfig_path=$(terraform -chdir=stacks/k8s output -raw kubeconfig_path)
          echo "KUBECONFIG=$(realpath "$kubeconfig_path")" >> $GITHUB_ENV

      - name: Apply system stack (Istio + Argo CD)
        run: |
          terraform -chdir=stacks/system init -input=false
          terraform -chdir=stacks/system apply -auto-approve -input=false

      - name: Wait for Argo CD API readiness
        run: |
          for attempt in {1..60}; do
            if kubectl -n argocd get deployment argo-cd-argocd-server >/dev/null 2>&1; then
              break
            fi
            echo "Waiting for argo-cd-argocd-server deployment to be created (${attempt}/60)..."
            sleep 10
          done
          if ! kubectl -n argocd get deployment argo-cd-argocd-server >/dev/null 2>&1; then
            echo "argo-cd-argocd-server deployment was not created within the expected time."
            exit 1
          fi
          kubectl -n argocd wait --for=condition=Available deployment/argo-cd-argocd-server --timeout=300s
          kubectl -n argocd wait --for=condition=Ready pod -l app.kubernetes.io/name=argocd-server --timeout=300s

      - name: Apply platform stack
        run: |
          terraform -chdir=stacks/platform init -input=false
          terraform -chdir=stacks/platform apply -auto-approve -input=false

      - name: Verify platform workloads and Argo CD health
        run: ./.github/scripts/verify_platform_health.sh

      - name: Destroy platform stack (PR only)
        if: ${{ always() && github.event_name == 'pull_request' }}
        run: |
          terraform -chdir=stacks/platform init -input=false
          terraform -chdir=stacks/platform destroy -auto-approve -input=false

      - name: Destroy system stack (PR only)
        if: ${{ always() && github.event_name == 'pull_request' }}
        run: |
          terraform -chdir=stacks/system init -input=false
          terraform -chdir=stacks/system destroy -auto-approve -input=false

      - name: Destroy k8s stack (PR only)
        if: ${{ always() && github.event_name == 'pull_request' }}
        run: |
          terraform -chdir=stacks/k8s init -input=false
          terraform -chdir=stacks/k8s destroy -auto-approve -input=false

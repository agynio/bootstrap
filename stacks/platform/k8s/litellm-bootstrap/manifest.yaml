apiVersion: v1
kind: ServiceAccount
metadata:
  name: litellm-bootstrap
  namespace: platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: litellm-bootstrap-secrets-writer
  namespace: platform
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: litellm-bootstrap-secrets-writer
  namespace: platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: litellm-bootstrap-secrets-writer
subjects:
  - kind: ServiceAccount
    name: litellm-bootstrap
    namespace: platform
---
apiVersion: batch/v1
kind: Job
metadata:
  name: litellm-bootstrap-default-key
  namespace: platform
  annotations:
    argocd.argoproj.io/sync-wave: "13"
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: litellm-bootstrap
      containers:
        - name: bootstrap
          image: public.ecr.aws/docker/library/alpine:3.19.1
          imagePullPolicy: IfNotPresent
          env:
            - name: LITELLM_BASE_URL
              value: "http://litellm:4000"
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-master-key
                  key: LITELLM_MASTER_KEY
            - name: LITELLM_DEFAULT_ALIAS
              value: "agents/default"
            - name: OUTPUT_SECRET_NAME
              value: "litellm-default-key"
            - name: OUTPUT_SECRET_KEY
              value: "LITELLM_DEFAULT_KEY"
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          command: ["/bin/sh", "-ec"]
          args:
            - |
              set -euo pipefail
              echo "[litellm-bootstrap] installing tooling"
              apk add --no-cache ca-certificates curl jq >/dev/null

              KUBECTL_VERSION="v1.29.2"
              curl -fsSL "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl" -o /usr/local/bin/kubectl
              chmod +x /usr/local/bin/kubectl

              api="$LITELLM_BASE_URL"
              alias="$LITELLM_DEFAULT_ALIAS"

              echo "[litellm-bootstrap] waiting for LiteLLM..."
              health_ready() {
                url="$1"
                code=$(curl -s -o /dev/null -w '%{http_code}' "$url" 2>/dev/null || true)
                code=$(echo "${code:-000}" | tr -d '\r\n')
                case "$code" in
                  200|401|403) return 0 ;;
                  *) return 1 ;;
                esac
              }

              for i in $(seq 1 180); do
                if health_ready "$api/health" || health_ready "$api/v1/health"; then
                  break
                fi
                sleep 1
                if [ "$i" = "180" ]; then
                  echo "[litellm-bootstrap] ERROR: LiteLLM not reachable"
                  exit 1
                fi
              done

              auth="Authorization: Bearer $LITELLM_MASTER_KEY"
              ct="Content-Type: application/json"

              gen_body='{"key_alias":"'"$alias"'","duration":null,"metadata":{"bootstrap":true}}'

              try_generate() {
                base="$1"
                url="$base/key/generate"
                echo "[litellm-bootstrap] POST $url"
                resp=$(curl -sS -w '\n%{http_code}' -H "$auth" -H "$ct" -d "$gen_body" "$url" || true)
                code=$(echo "$resp" | tail -n1)
                body=$(echo "$resp" | sed '$d')
                echo "$code" > /tmp/code
                echo "$body" > /tmp/body
              }

              try_generate "$api"
              code=$(cat /tmp/code)
              body=$(cat /tmp/body)

              if [ "$code" = "404" ]; then
                try_generate "$api/v1"
                code=$(cat /tmp/code)
                body=$(cat /tmp/body)
              fi

              if [ "${code#2}" != "$code" ] || [ "$code" = "409" ]; then
                echo "[litellm-bootstrap] key generate response code=$code"
              else
                echo "[litellm-bootstrap] ERROR: key generation failed code=$code body=$body"
                exit 1
              fi

              key=$(echo "$body" | tr -d '\n' | sed -n 's/.*"key"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1 || true)

              if [ -n "$key" ]; then
                echo "[litellm-bootstrap] got key; writing secret ${NAMESPACE}/${OUTPUT_SECRET_NAME}"
                kubectl -n "$NAMESPACE" apply -f - <<EOF
              apiVersion: v1
              kind: Secret
              metadata:
                name: ${OUTPUT_SECRET_NAME}
                namespace: ${NAMESPACE}
              type: Opaque
              stringData:
                ${OUTPUT_SECRET_KEY}: "${key}"
              EOF
              else
                echo "[litellm-bootstrap] no key returned (possibly already exists). Not updating ${OUTPUT_SECRET_NAME}."
              fi

              echo "[litellm-bootstrap] done"
